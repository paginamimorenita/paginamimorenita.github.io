<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiempo Juntos 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Lato:wght@300;400;700&family=Caveat:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="iconos/despertador.png">

<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

:root {
  --sky-top:    #0a0618;
  --sky-mid:    #0f0b2a;
  --sky-hor:    #1a1040;
  --glow-blue:  #4a6fe8;
  --moon-glow:  #fff8d0;
  --grass-dark: #0a1f0a;
  --grass-mid:  #0d2a0d;
  --grass-light:#1a4010;
  --pink:       #e8507a;
  --pink-light: #f9b8ce;
  --cream:      #fff8ee;
  --gold:       #f0d060;
}

body {
  min-height:100vh;
  overflow:hidden;
  position:relative;
  font-family:'Lato',sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
}

/* ══════════════════════════════
   NIGHT SKY SCENE
══════════════════════════════ */
.scene {
  position:fixed; inset:0; z-index:0;
  background:linear-gradient(180deg,
    #060412 0%,
    #0a0820 20%,
    #0f0d2e 45%,
    #14103a 65%,
    #1a1445 80%,
    #1e1830 90%,
    #0d1a08 100%
  );
}

/* ── Stars ── */
.stars-wrap { position:absolute; inset:0; }
.star {
  position:absolute; border-radius:50%;
  background:#fff; animation:twinkle ease-in-out infinite;
}
@keyframes twinkle {
  0%,100%{opacity:.2;transform:scale(1);}
  50%{opacity:1;transform:scale(1.4);}
}

/* Shooting stars */
.shoot {
  position:absolute;
  width:100px; height:1.5px;
  background:linear-gradient(90deg,rgba(255,255,255,0),#fff);
  border-radius:2px;
  animation:shoot linear infinite;
  opacity:0;
}
@keyframes shoot {
  0%  {transform:translateX(0) translateY(0) rotate(-30deg); opacity:0;}
  5%  {opacity:1;}
  40% {transform:translateX(-300px) translateY(200px) rotate(-30deg); opacity:0;}
  100%{transform:translateX(-300px) translateY(200px) rotate(-30deg); opacity:0;}
}

/* ── Moon ── */
.moon-wrap {
  position:absolute; top:15%; right:12%;
  animation:moonFloat 8s ease-in-out infinite;
}
@keyframes moonFloat {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
}
.moon {
  width:130px; height:130px; border-radius:50%;
  background:radial-gradient(circle at 38% 38%,
    #fffef0 0%, #fef8b0 30%, #f0dc60 70%, #d0a820 100%);
  box-shadow:
    0 0 30px 12px rgba(255,240,100,.18),
    0 0 70px 30px rgba(255,230,80,.1),
    0 0 140px 60px rgba(255,220,60,.06);
  position:relative;
  overflow:hidden;
}
/* Moon craters */
.moon::before {
  content:'';position:absolute;
  width:22px;height:22px;border-radius:50%;
  background:rgba(180,140,20,.28);
  top:28px;left:32px;
  box-shadow:
    30px 40px 0 12px rgba(180,140,20,.18),
    -10px 55px 0 7px rgba(180,140,20,.22),
    50px 18px 0 5px rgba(180,140,20,.15);
}
/* Moon shine */
.moon::after {
  content:'';position:absolute;
  width:35px;height:80px;border-radius:50%;
  background:rgba(255,255,240,.18);
  top:12px;left:20px;
  transform:rotate(-15deg);
}
/* Moon halo ring */
.moon-halo {
  position:absolute;
  top:-28px;left:-28px;right:-28px;bottom:-28px;
  border-radius:50%;
  border:1px solid rgba(255,240,100,.12);
  box-shadow:0 0 40px 20px rgba(255,240,100,.06);
}

/* ── Clouds ── */
.cloud {
  position:absolute;
  background:rgba(255,255,255,.04);
  border-radius:50px;
  filter:blur(18px);
  animation:cloudDrift linear infinite;
}
@keyframes cloudDrift {
  from{transform:translateX(0);}
  to{transform:translateX(-120vw);}
}

/* ── Mountains / hills background ── */
.hills-bg {
  position:absolute;
  bottom:8%;
  left:0;right:0;
  height:22%;
}
.hills-bg svg { width:100%; height:100%; }

/* ── Ground / Grass ── */
.ground {
  position:absolute;
  bottom:0; left:0; right:0;
  height:0%;
  background:linear-gradient(180deg,#0d2a0d 0%,#0a1f0a 50%,#060f06 100%);
}

/* Grass blades (SVG) */
.grass-layer {
  position:absolute;
  bottom:0%; left:0; right:0;
  height:120px;
}
.grass-layer svg { width:100%; height:100%; }

/* ── Fireflies ── */
.firefly {
  position:absolute;
  width:4px;height:4px;
  border-radius:50%;
  background:#c8ff80;
  box-shadow:0 0 6px 3px rgba(180,255,80,.6);
  animation:fireflyAnim ease-in-out infinite;
  top:91%;
}
@keyframes fireflyAnim {
  0%  {transform:translate(0,0);        opacity:0;}
  20% {opacity:1;}
  50% {transform:translate(var(--fx),var(--fy)); opacity:.8;}
  80% {opacity:.3;}
  100%{transform:translate(0,0);        opacity:0;}
}

/* ── Flowers in field ── */
.flower {
  position:absolute;
  font-size:1rem;
  animation:flowerSway ease-in-out infinite alternate;
  transform-origin:bottom center;
  top:92%;
}
@keyframes flowerSway {
  from{transform:rotate(-4deg);}
  to{transform:rotate(4deg);}
}

/* ══════════════════════════════
   HEADER
══════════════════════════════ */
.page-top {
  position:relative; z-index:20;
  width:100%; max-width:700px;
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 24px 0;
}
.btn-back {
  font-family:'Caveat',cursive; font-size:1.05rem; font-weight:700;
  color:rgba(255,248,220,.85); background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.18); border-radius:30px;
  padding:7px 18px; cursor:pointer; backdrop-filter:blur(10px);
  text-decoration:none; display:inline-flex; align-items:center; gap:6px;
  transition:background .2s,transform .2s;
}
.btn-back:hover { background:rgba(255,255,255,.16); transform:translateX(-3px); }
.page-title-wrap { text-align:center; flex:1; }
.page-title {
  font-family:'Playfair Display',serif; font-style:italic;
  font-size:1.7rem; color:var(--moon-glow);
  text-shadow:0 2px 16px rgba(255,240,100,.4);
}
.page-title span { color:var(--pink-light); }
.page-sub {
  font-size:.72rem; font-weight:300; letter-spacing:3px;
  text-transform:uppercase; color:rgba(255,248,220,.35); margin-top:3px;
}
.spacer { width:90px; }

/* ══════════════════════════════
/* ══════════════════════════════
   ALARM CLOCK
══════════════════════════════ */
@keyframes fadeInUp { from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);} }
@keyframes digitTick { 0%{transform:scaleY(1);}40%{transform:scaleY(.92);}100%{transform:scaleY(1);} }
@keyframes sepBlink  { 0%,100%{opacity:.35;}50%{opacity:1;} }
@keyframes ledPulse  { 0%,100%{box-shadow:0 0 5px 2px rgba(232,80,122,.4);}50%{box-shadow:0 0 10px 5px rgba(232,80,122,.7);} }

.clock-wrap {
  position:relative; z-index:20;
  margin-top:8px;
  display:flex; flex-direction:column; align-items:center; gap:0;
  animation:fadeInUp .9s ease;
}

/* Bells row */
.clock-top {
  display:flex; align-items:flex-end; justify-content:space-between;
  width:190px;
  margin-bottom:-3px;
  position:relative; z-index:4;
}
.bell {
  width:44px; height:38px;
  background:linear-gradient(160deg,#5a4a70,#3a2a50);
  border-radius:50% 50% 30% 30%;
  box-shadow:0 4px 14px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.12);
  position:relative; flex-shrink:0;
}
.bell::before {
  content:'';position:absolute;
  bottom:-8px; left:50%; transform:translateX(-50%);
  width:16px; height:10px;
  background:#3a2a50; border-radius:0 0 4px 4px;
}
.bell-hammer {
  position:absolute; bottom:-18px; left:50%; transform:translateX(-50%);
  width:18px; height:18px; border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#9a8ab0,#5a4a70);
  box-shadow:0 2px 6px rgba(0,0,0,.5); z-index:2;
}

/* Clock body */
.clock-body {
  width:300px;
  background:linear-gradient(160deg,#2a1a3e 0%,#1a1030 60%,#120c28 100%);
  border-radius:26% 26% 38% 38% / 28% 28% 24% 24%;
  padding:24px 20px 28px;
  box-shadow:
    0 0 0 4px #3a2a50,
    0 0 0 7px #1e1238,
    0 24px 60px rgba(0,0,0,.7),
    inset 0 2px 0 rgba(255,255,255,.07);
  position:relative;
  display:flex; flex-direction:column; align-items:center; gap:8px;
}

.led {
  position:absolute; top:35px; right:20px;
  width:7px; height:7px; border-radius:50%;
  background:#e8507a;
  animation:ledPulse 1.2s ease-in-out infinite;
  z-index: 999
}

.clock-knob {
  position:absolute; right:-15px; top:80px;
  width:15px; height:45px;
  background:linear-gradient(90deg,#6a5a80,#4a3a60);
  border-radius:5px;
  box-shadow:inset -2x 0 4px rgba(0,0,0,.4);
}

/* Glass face — full width of body minus padding */
.clock-face {
  width:calc(100% - 24px);
  background:linear-gradient(160deg,#180e2e 0%,#100820 100%);
  border-radius:14px;
  padding:16px 12px 14px;
  border:1.5px solid rgba(255,255,255,.05);
  box-shadow:inset 0 2px 14px rgba(0,0,0,.6);
  position:relative; overflow:hidden;
}
.clock-face::after {
  content:''; position:absolute;
  top:0;left:0;right:0;height:45%;
  background:linear-gradient(180deg,rgba(255,255,255,.03),transparent);
  border-radius:12px 12px 0 0; pointer-events:none;
}

.start-label {
  font-family:'Lato',sans-serif; font-weight:300;
  font-size:.58rem; letter-spacing:2px; text-transform:uppercase;
  color:rgba(255,248,220,.28); text-align:center; margin-bottom:8px;
}

.days-row {
  display:flex; flex-direction:column; align-items:center; margin-bottom:8px;
}
.days-value {
  font-family:'Orbitron',monospace; font-size:3rem; font-weight:700;
  color:#f0d8ff;
  text-shadow:0 0 18px rgba(220,180,255,.7),0 0 36px rgba(180,120,255,.3);
  letter-spacing:5px; line-height:1;
}
.days-value.tick { animation:digitTick .15s ease; }
.days-label {
  font-size:.58rem; font-weight:300; letter-spacing:3px; text-transform:uppercase;
  color:rgba(255,248,220,.3); margin-top:4px;
}

.digit-group {
  display:flex; align-items:center; justify-content:center;
  gap:3px; margin-bottom:6px; width:100%;
}
.digit-block {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  flex:1;
}
.digit-value {
  font-family:'Orbitron',monospace; font-size:1.6rem; font-weight:700;
  color:#ddd0ff;
  background:linear-gradient(180deg,#261645,#180e30);
  border-radius:8px; padding:6px 4px;
  width:100%; text-align:center;
  box-shadow:inset 0 2px 8px rgba(0,0,0,.55),0 0 10px rgba(140,100,255,.15);
  border:1px solid rgba(255,255,255,.05);
  text-shadow:0 0 10px rgba(200,180,255,.55);
  letter-spacing:2px;
}
.digit-value.tick { animation:digitTick .15s ease; }
.digit-label {
  font-size:.52rem; font-weight:300; letter-spacing:1px; text-transform:uppercase;
  color:rgba(255,248,220,.28);
}
.digit-sep {
  font-family:'Orbitron',monospace; font-size:1.3rem; font-weight:700;
  color:rgba(200,180,255,.35);
  margin-bottom:18px; flex-shrink:0;
  animation:sepBlink 1s ease-in-out infinite;
}

.clock-msg {
  font-family:'Playfair Display',serif; font-style:italic;
  font-size:.78rem; color:rgba(255,248,220,.36);
  text-align:center;
}

.since-tag {
  font-family:'Caveat',cursive; font-size:.95rem; font-weight:700;
  color:rgba(255,248,220,.42); text-align:center; letter-spacing:1px;
}

.clock-feet {
  display:flex; justify-content:center; gap:90px; margin-top:-2px;
}
.foot {
  width:22px; height:12px;
  background:linear-gradient(180deg,#3a2a50,#221438);
  border-radius:0 0 8px 8px;
  box-shadow:0 4px 8px rgba(0,0,0,.5);
}
.clock-shadow {
  width:200px; height:14px;
  background:radial-gradient(ellipse,rgba(0,0,0,.45) 0%,transparent 70%);
  border-radius:50%; margin-top:-2px;
}

.love-msg {
  position:relative; z-index:20;
  font-family:'Playfair Display',serif; font-style:italic;
  font-size:1rem; color:rgba(255,248,220,.6);
  text-align:center; max-width:320px;
  text-shadow:0 1px 8px rgba(0,0,0,.5);
  margin-top:12px;
  animation:fadeInUp 1.2s ease;
}

/* ══ Responsive ══ */
@media(max-width:480px){
  .clock-body { width:250px; padding:20px 14px 24px; }
  .clock-top  { width:155px; }
  .days-value { font-size:2.4rem; }
  .digit-value{ font-size:1.25rem; }
  .digit-sep  { font-size:1.1rem; }
  .page-title { font-size:1.4rem; }
  .spacer     { width:60px; }
  .moon       { width:100px; height:100px; }
}

</style>
</head>

<!-- Música de fondo -->

<!-- Botón flotante de control -->
<div id="musicControl" style="position:fixed; bottom:20px; right:20px; z-index:999; background:rgba(27, 73, 15); border-radius:50px; padding:8px 16px; cursor:pointer; font-family:'Lato',sans-serif; font-weight:bold; box-shadow:0 4px 12px rgba(0,0,0,.2); backdrop-filter:blur(5px); display:flex; align-items:center; gap:6px;">
  <span id="musicIcon">🔇</span>
  <span id="musicText">Música</span>
</div>

<!-- Sonido de tic-tac -->
<audio id="tickSound" preload="auto">
  <source src="sonidos_musica/tick.mp3" type="audio/mpeg">
</audio>

<script>

(function() {
  const bgMusic = document.getElementById('bgMusic');
  // Volumen por defecto al 50%
  bgMusic.volume = 0.8;

  const musicControl = document.getElementById('musicControl');
  const musicIcon = document.getElementById('musicIcon');
  const musicText = document.getElementById('musicText');
  let musicPlaying = false;

  // Intentar reproducir automáticamente (puede ser bloqueado por el navegador)
  bgMusic.play().then(() => {
    musicPlaying = true;
    musicIcon.textContent = '🔊';
    musicText.textContent = 'Música';
  }).catch(() => {
    // Bloqueado, mostramos icono de silencio
    musicPlaying = false;
    musicIcon.textContent = '🔇';
    musicText.textContent = 'Música';
  });

  // Alternar reproducir/pausar al hacer clic
  musicControl.addEventListener('click', () => {
    if (musicPlaying) {
      bgMusic.pause();
      musicPlaying = false;
      musicIcon.textContent = '🔇';
      musicText.textContent = 'Música';
    } else {
      bgMusic.play().then(() => {
        musicPlaying = true;
        musicIcon.textContent = '🔊';
        musicText.textContent = 'Música';
      }).catch(e => {
        alert('No se pudo reproducir la música. Por favor, haz clic de nuevo.');
      });
    }
  });
})();

// ══════════════════════════════════════════════════
//  👇 CAMBIA AQUÍ LA FECHA EN QUE EMPEZARON
//  Formato: new Date(AÑO, MES-1, DÍA)
//  Ejemplo: 14 de febrero 2024 → new Date(2024, 1, 14)
//  (Los meses van de 0=enero a 11=diciembre)
// ══════════════════════════════════════════════════
const START_DATE = new Date(2026, 0, 17); // ← Cambia esta fecha
// ══════════════════════════════════════════════════

// ── Elementos de audio ──
const bgMusic = document.getElementById('bgMusic');
const tickSound = document.getElementById('tickSound');

// Volumen de la música al 50%
bgMusic.volume = 0.8;

// Volumen del tick (ajústalo si quieres)
tickSound.volume = 0.2;

// ── Control de música y tic-tac ──
const musicControl = document.getElementById('musicControl');
const musicIcon = document.getElementById('musicIcon');
const musicText = document.getElementById('musicText');
let musicPlaying = false;
let tickInterval = null;

// Iniciar tic-tac
function startTick() {
  if (tickInterval) return;
  // Reproducir inmediatamente el primer tick
  tickSound.currentTime = 0;
  tickSound.play().catch(() => {});
  // Luego cada segundo
  tickInterval = setInterval(() => {
    tickSound.currentTime = 0;
    tickSound.play().catch(() => {});
  }, 1000);
}

// Detener tic-tac
function stopTick() {
  if (tickInterval) {
    clearInterval(tickInterval);
    tickInterval = null;
  }
}

// Intentar reproducir música automáticamente (puede fallar)
bgMusic.play().then(() => {
  musicPlaying = true;
  musicIcon.textContent = '🔊';
  musicText.textContent = 'Música';
  startTick(); // Si la música suena automáticamente, inicia tick
}).catch(() => {
  // Bloqueado por el navegador, mostramos icono de silencio
  musicPlaying = false;
  musicIcon.textContent = '🔇';
  musicText.textContent = 'Música';
});

// Alternar reproducir/pausar al hacer clic
musicControl.addEventListener('click', () => {
  if (musicPlaying) {
    bgMusic.pause();
    musicPlaying = false;
    musicIcon.textContent = '🔇';
    musicText.textContent = 'Música';
    stopTick(); // Detener tic-tac al pausar
  } else {
    bgMusic.play().then(() => {
      musicPlaying = true;
      musicIcon.textContent = '🔊';
      musicText.textContent = 'Música';
      startTick(); // Iniciar tic-tac al reproducir
    }).catch(e => {
      alert('No se pudo reproducir la música. Por favor, haz clic de nuevo.');
    });
  }
});

// ── Formato de fecha de inicio ──
const months = ['enero','febrero','marzo','abril','mayo','junio',
                'julio','agosto','septiembre','octubre','noviembre','diciembre'];
const d = START_DATE;
document.getElementById('startDateLabel').textContent =
  `${d.getDate()} de ${months[d.getMonth()]} de ${d.getFullYear()}`;
document.getElementById('sinceTag').textContent =
  `desde el ${d.getDate()} / ${d.getMonth()+1} / ${d.getFullYear()}`;

// ── Mensajes rotativos ──
const loveMessages = [
  "Cada segundo con usted vale más que mil vidas sin usted. 💕",
  "El tiempo pasa, pero mi amor por usted solo crece. ❤️",
  "Gracias por cada uno de esos segundos a mi lado mi amor. 🌙",
  "Es mi momento favorito de cada día. 💫",
  "El tiempo a su lado es el más valioso de mi vida. 🌸",
];

let msgIdx = 0;
document.getElementById('loveMsg').textContent = loveMessages[0];
setInterval(() => {
  msgIdx = (msgIdx + 1) % loveMessages.length;
  const el = document.getElementById('loveMsg');
  el.style.opacity = 0;
  el.style.transition = 'opacity .6s';
  setTimeout(() => {
    el.textContent = loveMessages[msgIdx];
    el.style.opacity = 1;
  }, 650);
}, 5000);

// ── Contador de tiempo ──
function pad(n, len=2) { return String(Math.floor(n)).padStart(len,'0'); }

let prevSecs = -1;
let prevMins = -1;
let prevHours = -1;
let prevDays  = -1;

function updateCounter() {
  const now  = new Date();
  const diff = now - START_DATE; // ms

  const totalSecs  = Math.floor(diff / 1000);
  const secs       = totalSecs % 60;
  const totalMins  = Math.floor(totalSecs / 60);
  const mins       = totalMins % 60;
  const totalHours = Math.floor(totalMins / 60);
  const hours      = totalHours % 24;
  const days       = Math.floor(totalHours / 24);

  // Actualizar y animar
  function setVal(id, val, prev) {
    const el = document.getElementById(id);
    el.textContent = pad(val);
    if(val !== prev) {
      el.classList.remove('tick');
      void el.offsetWidth; // reflow
      el.classList.add('tick');
    }
  }

  setVal('dSecs',  secs,  prevSecs);
  if(mins  !== prevMins)  setVal('dMins',  mins,  prevMins);
  if(hours !== prevHours) setVal('dHours', hours, prevHours);
  if(days  !== prevDays) {
    const dEl = document.getElementById('dDays');
    dEl.textContent = pad(days, 3);
    dEl.classList.remove('tick');
    void dEl.offsetWidth;
    dEl.classList.add('tick');
  }

  prevSecs  = secs;
  prevMins  = mins;
  prevHours = hours;
  prevDays  = days;
}
updateCounter();
setInterval(updateCounter, 1000);

// ── Generate stars ──
const starsWrap = document.getElementById('starsWrap');
for(let i=0;i<220;i++){
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() < 0.85 ? (Math.random()*2+.5) : (Math.random()*4+2);
  s.style.cssText = `
    width:${size}px; height:${size}px;
    top:${Math.random()*70}%;
    left:${Math.random()*100}%;
    animation-duration:${2+Math.random()*4}s;
    animation-delay:${Math.random()*5}s;
  `;
  starsWrap.appendChild(s);
}

// ── Fireflies ──
const ffWrap = document.getElementById('firefliesWrap');
for(let i=0;i<18;i++){
  const f = document.createElement('div');
  f.className = 'firefly';
  const x = (Math.random()-0.5)*120;
  const y = (Math.random()-0.5)*60 - 20;
  f.style.cssText = `
    left:${5+Math.random()*90}%;
    bottom:${18+Math.random()*12}%;
    --fx:${x}px; --fy:${y}px;
    animation-duration:${3+Math.random()*4}s;
    animation-delay:${Math.random()*5}s;
    width:${3+Math.random()*3}px;
    height:${3+Math.random()*3}px;
  `;
  ffWrap.appendChild(f);
}

// ── Field flowers ──
const flWrap = document.getElementById('flowersWrap');
const flowerTypes = ['🌷','🌼','💐','🌷','💐','🌼'];
for(let i=0;i<14;i++){
  const f = document.createElement('div');
  f.className = 'flower';
  f.textContent = flowerTypes[Math.floor(Math.random()*flowerTypes.length)];
  f.style.cssText = `
    left:${3+Math.random()*94}%;
    bottom:${18.5+Math.random()*5}%;
    font-size:${0.7+Math.random()*.8}rem;
    animation-duration:${2+Math.random()*3}s;
    animation-delay:${Math.random()*2}s;
    opacity:${0.5+Math.random()*.5};
    z-index:3;
  `;
  flWrap.appendChild(f);
}
</script>
</body>
