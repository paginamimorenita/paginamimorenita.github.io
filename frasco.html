<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frasco de Razones 💕</title>
<!-- Preconnect para fuentes -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Fuentes con display=swap para evitar bloqueo -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="iconos/frasco_rosado.png">

<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

:root {
  --pink:       #e8620a;
  --pink-light: #ffcc80;
  --pink-pale:  #fff0e0;
  --cream:      #fff8f2;
  --gold:       #d4a843;
  --text-dark:  #3a1500;
}

body {
  min-height:100vh;
  background: linear-gradient(160deg, #fff0e0 0%, #ffd4a0 40%, #ffb06a 100%);
  display:flex; flex-direction:column; align-items:center;
  font-family:'Lato', sans-serif;
  overflow-x:hidden;
  padding:0 0 80px;
  position:relative;
}

/* ── Floating petals bg ── */
.bg-layer { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0; }
.petal { position:absolute; opacity:0; animation:petalFall linear infinite; color:var(--pink); }
@keyframes petalFall {
  0%  { transform:translateY(-40px) rotate(0deg);  opacity:0; }
  8%  { opacity:.2; } 92% { opacity:.2; }
  100%{ transform:translateY(110vh) rotate(540deg);opacity:0; }
}

@keyframes fadeInUp { from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);} }
@keyframes pulse    { 0%,100%{transform:scale(1);}50%{transform:scale(1.06);} }
@keyframes floatJar { 0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);} }
@keyframes shimmer  { 0%{opacity:.18;}50%{opacity:.45;}100%{opacity:.18;} }
@keyframes pop      { 0%{transform:scale(.5);opacity:0;}70%{transform:scale(1.08);}100%{transform:scale(1);opacity:1;} }
@keyframes heartPop { 0%{transform:scale(0) rotate(-20deg);opacity:0;}60%{transform:scale(1.3) rotate(5deg);}100%{transform:scale(1) rotate(0deg);opacity:1;} }

/* Paper drop into jar animation - keyframes for each paper added via JS */
@keyframes paperDrop {
  0%   { transform:var(--drop-start) rotate(var(--rot-start)); opacity:0; }
  30%  { opacity:1; }
  60%  { transform:var(--drop-mid) rotate(var(--rot-mid)); }
  80%  { transform:var(--drop-end) rotate(var(--rot-end)); }
  100% { transform:var(--drop-final) rotate(var(--rot-final)); opacity:1; }
}

/* ── Header ── */
.page-top {
  position:relative; z-index:10;
  width:100%; max-width:700px;
  display:flex; align-items:center; justify-content:space-between;
  padding:22px 24px 0;
  animation:fadeInUp .6s ease;
}
.btn-back {
  font-family:'Caveat',cursive; font-size:1.1rem; font-weight:700;
  color:var(--pink); background:rgba(255,255,255,.6);
  border:1.5px solid rgba(232,100,10,.25); border-radius:30px;
  padding:8px 20px; cursor:pointer; backdrop-filter:blur(8px);
  text-decoration:none; display:inline-flex; align-items:center; gap:6px;
  transition:background .2s, transform .2s;
  box-shadow:0 2px 12px rgba(232,100,10,.1);
}
.btn-back:hover { background:rgba(255,255,255,.88); transform:translateX(-3px); }
.page-title-wrap { text-align:center; flex:1; }
.page-title {
  font-family:'Playfair Display',serif; font-style:italic;
  font-size:1.9rem; color:var(--text-dark);
}
.page-title span { color:var(--pink); }
.page-sub {
  font-size:.75rem; font-weight:300; letter-spacing:3px;
  text-transform:uppercase; color:rgba(58,25,0,.4); margin-top:4px;
}
.spacer { width:100px; }

/* ── Main ── */
.main-wrap {
  position:relative; z-index:10;
  width:100%; max-width:600px;
  padding:10px 24px 0;
  display:flex; flex-direction:column; align-items:center; gap:10px;
}

/* ── Counter ── */
.counter-badge {
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,.65); backdrop-filter:blur(10px);
  border:1.5px solid rgba(232,100,10,.2); border-radius:30px;
  padding:8px 20px;
  box-shadow:0 4px 16px rgba(232,100,10,.1);
  animation:fadeInUp .8s ease;
}
.counter-text { font-size:.75rem; font-weight:300; letter-spacing:2px; text-transform:uppercase; color:rgba(58,25,0,.5); }
.counter-num  { font-family:'Playfair Display',serif; font-size:1.2rem; color:var(--pink); font-style:italic; }

.instruction {
  font-family:'Playfair Display',serif; font-style:italic;
  font-size:1rem; color:rgba(58,25,0,.5); text-align:center;
}

/* ── JAR wrapper ── */
.jar-wrap {
  position:relative; cursor:pointer;
  animation:floatJar 4s ease-in-out infinite, fadeInUp 1s ease;
  filter:drop-shadow(0 18px 36px rgba(232,100,10,.2));
  transition:filter .3s;
  user-select:none;
}
.jar-wrap:hover { filter:drop-shadow(0 22px 48px rgba(232,100,10,.32)); }
.jar-wrap:active { transform:scale(.97); }

/* Hint text below jar */
.jar-hint {
  text-align:center; margin-top:4px;
  font-family:'Caveat',cursive; font-size:1.05rem;
  color:var(--pink); opacity:.65;
  animation:pulse 2.5s ease-in-out infinite;
}

/* Click-burst hearts */
.click-heart {
  position:fixed; pointer-events:none; z-index:999;
  font-size:1.3rem; color:var(--pink);
  animation:riseHeart 1.1s ease forwards;
}
@keyframes riseHeart {
  0%  { transform:translate(-50%,-50%) scale(0) rotate(-15deg); opacity:1; }
  55% { transform:translate(-50%,-130%) scale(1.2) rotate(8deg);  opacity:1; }
  100%{ transform:translate(-50%,-190%) scale(.7) rotate(-5deg);  opacity:0; }
}

/* ── Progress hearts ── */
.progress-hearts {
  display:flex; gap:6px; justify-content:center; flex-wrap:wrap;
  max-width:320px; animation:fadeInUp 1.2s ease;
}
.ph { font-size:1rem; opacity:.25; transition:opacity .4s,transform .4s; }
.ph.seen { opacity:1; animation:heartPop .5s ease; }

/* Doodles */
.doodle {
  position:absolute; pointer-events:none; z-index:2;
  font-size:1.6rem; opacity:.18; animation:shimmer 4s ease-in-out infinite;
}

/* ══ MODAL ══ */
#modal-overlay {
  display:none; position:fixed; inset:0; z-index:1000;
  background:rgba(58,25,0,.45); backdrop-filter:blur(7px);
  align-items:center; justify-content:center; padding:20px;
}
#modal-overlay.open { display:flex; }
.modal-card {
  position:relative; width:100%; max-width:440px;
  background:linear-gradient(160deg,#fff8f2 0%,#fff0e0 100%);
  border-radius:28px; padding:52px 40px 38px;
  box-shadow:0 30px 80px rgba(58,25,0,.25),0 0 0 1px rgba(232,100,10,.12),inset 0 1px 0 rgba(255,255,255,.8);
  text-align:center; animation:pop .4s cubic-bezier(.34,1.56,.64,1);
}
.modal-card::before {
  content:''; position:absolute; top:0;left:0;right:0;height:6px;
  background:linear-gradient(90deg,var(--pink-light),var(--pink),var(--pink-light));
  border-radius:28px 28px 0 0;
}
.modal-number {
  position:absolute; top:-18px; left:50%; transform:translateX(-50%);
  width:36px; height:36px; border-radius:50%;
  background:linear-gradient(135deg,var(--pink),#c04400);
  color:#fff; font-family:'Playfair Display',serif; font-size:.9rem; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 14px rgba(232,100,10,.4); border:2.5px solid #fff;
}
.modal-heart { font-size:2.8rem; margin-bottom:14px; display:block; animation:heartPop .5s ease .1s both; }
.modal-label { font-size:.7rem; font-weight:300; letter-spacing:3px; text-transform:uppercase; color:rgba(58,25,0,.4); margin-bottom:10px; }
.modal-reason { font-family:'Playfair Display',serif; font-size:1.3rem; line-height:1.75; color:var(--text-dark); font-style:italic; margin-bottom:22px; }
.modal-sig { font-family:'Caveat',cursive; font-size:1.2rem; font-weight:700; color:var(--pink); margin-bottom:26px; }
.modal-close {
  background:linear-gradient(135deg,var(--pink),#c04400); border:none; border-radius:50px;
  color:#fff; font-size:.8rem; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  padding:12px 36px; cursor:pointer;
  box-shadow:0 6px 20px rgba(232,100,10,.35); transition:transform .2s,box-shadow .2s;
}
.modal-close:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(232,100,10,.45); }
.modal-another {
  display:block; margin-top:14px; background:none; border:none;
  font-family:'Playfair Display',serif; font-style:italic;
  font-size:.9rem; color:rgba(58,25,0,.45); cursor:pointer; transition:color .2s;
}
.modal-another:hover { color:var(--pink); }
.modal-confetti { position:absolute; top:0;left:0;right:0;height:100%; border-radius:28px; overflow:hidden; pointer-events:none; }
.m-dot {
  position:absolute; border-radius:50%;
  animation:mdotFall linear forwards; opacity:.7;
}
@keyframes mdotFall { 0%{transform:translateY(-10px) rotate(0deg);opacity:.7;} 100%{transform:translateY(110%) rotate(360deg);opacity:0;} }

@media(max-width:480px){
  .page-title{font-size:1.5rem;} .spacer{width:60px;}
  .modal-card{padding:44px 26px 32px;} .modal-reason{font-size:1.1rem;}
}
</style>
</head>
<body>

<div class="bg-layer" id="bgLayer"></div>
<span class="doodle" style="top:12%;left:5%;animation-delay:0s">💌</span>
<span class="doodle" style="top:20%;right:4%;animation-delay:1s">🌸</span>
<span class="doodle" style="top:55%;left:3%;animation-delay:2s">✨</span>
<span class="doodle" style="top:72%;right:5%;animation-delay:.6s">💫</span>
<span class="doodle" style="top:84%;left:7%;animation-delay:1.5s">🌷</span>
<span class="doodle" style="top:40%;right:3%;animation-delay:2.5s">💕</span>

<!-- Header -->
<div class="page-top">
  <a class="btn-back" href="index.html">← Volver</a>
  <div class="page-title-wrap">
    <h1 class="page-title">Frasco de <span>Razones</span> 💕</h1>
    <p class="page-sub">Para La Morenita mas hermosa del mundo, con todo mi corazón</p>
  </div>
  <div class="spacer"></div>
</div>

<div class="main-wrap">

  <p class="instruction">Toque el frasco y descubre una razón ✨</p>

  <div class="counter-badge">
    <span class="counter-text">Razones descubiertas</span>
    <span class="counter-num" id="seenCount">0</span>
    <span class="counter-text">de</span>
    <span class="counter-num" id="totalCount">0</span>
  </div>

  <!-- ══ JAR SVG ══ -->
  <div class="jar-wrap" id="jarWrap" onclick="openReason(event)">
    <svg id="jarSvg" viewBox="0 0 260 330" xmlns="http://www.w3.org/2000/svg" width="260" height="330">
      <defs>
        <!-- Clip path so papers stay inside the glass -->
        <clipPath id="jarClip">
          <path d="M82 60 Q77 64 74 76 L64 272 Q62 294 130 297 Q198 294 196 272 L186 76 Q183 64 178 60 Z"/>
        </clipPath>
        <linearGradient id="jarGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#fff0e0"/>
          <stop offset="30%"  stop-color="#fff8f0"/>
          <stop offset="70%"  stop-color="#ffe4c0"/>
          <stop offset="100%" stop-color="#ffc8a0"/>
        </linearGradient>
        <linearGradient id="lidGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#e8b870"/>
          <stop offset="100%" stop-color="#b06000"/>
        </linearGradient>
        <linearGradient id="lidTop" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#f0cc80"/>
          <stop offset="100%" stop-color="#c89030"/>
        </linearGradient>
        <linearGradient id="fillGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="rgba(255,150,50,.0)"/>
          <stop offset="100%" stop-color="rgba(255,150,50,.55)"/>
        </linearGradient>
      </defs>

      <!-- Drop shadow -->
      <ellipse cx="130" cy="320" rx="78" ry="9" fill="rgba(230,100,20,.12)"/>

      <!-- Jar body (glass) -->
      <path d="M82 60 Q77 64 74 76 L64 272 Q62 294 130 297 Q198 294 196 272 L186 76 Q183 64 178 60 Z"
            fill="url(#jarGrad)" opacity=".92"/>

      <!-- ── Papers group (clipped inside glass) ── -->
      <g id="jarPapers" clip-path="url(#jarClip)"></g>

      <!-- Fill level overlay (liquid-like tint that rises) — clipped too -->
      <rect id="fillRect" x="64" y="297" width="132" height="0"
            fill="url(#fillGrad)" clip-path="url(#jarClip)"
            style="transition:y 0.6s ease, height 0.6s ease;"/>

      <!-- Glass shine (drawn ON TOP of papers) -->
      <path d="M87 78 Q84 95 85 210 Q86 230 92 240"
            stroke="rgba(255,255,255,.6)" stroke-width="5.5" fill="none" stroke-linecap="round" pointer-events="none"/>
      <path d="M97 70 Q95 85 96 145"
            stroke="rgba(255,255,255,.38)" stroke-width="2.5" fill="none" stroke-linecap="round" pointer-events="none"/>

      <!-- Lid ring shadow -->
      <rect x="74" y="55" width="112" height="10" rx="5" fill="#b87020" opacity=".5"/>
      <!-- Lid body -->
      <rect x="70" y="32" width="120" height="28" rx="8" fill="url(#lidGrad)"/>
      <!-- Lid top -->
      <rect x="80" y="22" width="100" height="16" rx="7" fill="url(#lidTop)"/>
      <!-- Lid shine -->
      <path d="M86 26 Q130 20 174 26" stroke="rgba(255,255,255,.4)" stroke-width="2" fill="none" stroke-linecap="round"/>

      <!-- Ribbon bow -->
      <g transform="translate(98,172)" pointer-events="none">
        <path d="M32 10 Q10 -12 4 4 Q-1 20 18 18 Z" fill="#ffb870" opacity=".95"/>
        <path d="M32 10 Q54 -12 60 4 Q65 20 46 18 Z" fill="#ffb870" opacity=".95"/>
        <circle cx="32" cy="11" r="7" fill="#e8620a"/>
        <circle cx="32" cy="11" r="3.5" fill="#ffb870" opacity=".5"/>
        <path d="M26 17 Q19 34 15 42" stroke="#ffb870" stroke-width="4" fill="none" stroke-linecap="round" opacity=".85"/>
        <path d="M38 17 Q45 34 49 42" stroke="#ffb870" stroke-width="4" fill="none" stroke-linecap="round" opacity=".85"/>
      </g>

      <!-- Bottom glass edge -->
      <ellipse cx="130" cy="293" rx="65" ry="5" fill="rgba(230,100,20,.1)"/>
    </svg>

    <div class="jar-hint" id="jarHint">¡Tócame! ✨</div>
  </div>

  <!-- Progress hearts -->
  <div class="progress-hearts" id="progressHearts"></div>

</div>

<!-- ══ MODAL ══ -->
<div id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal-card" id="modalCard">
    <div class="modal-confetti" id="modalConfetti"></div>
    <div class="modal-number" id="modalNum">1</div>
    <span class="modal-heart" id="modalHeart">💕</span>
    <p class="modal-label">Razón #<span id="modalNumLabel">1</span></p>
    <p class="modal-reason" id="modalReason">…</p>
    <p class="modal-sig">— Capibarita 💕</p>
    <button class="modal-close" onclick="closeModal()">Cerrar ✕</button>
    <button class="modal-another" onclick="nextReason()">Otra razón ✨</button>
  </div>
</div>

<!-- Música de fondo: precargar solo metadatos para acelerar carga -->
<audio id="bgMusic" loop preload="metadata">
  <source src="sonidos_musica/musica_frasco.mp3" type="audio/mpeg">
</audio>

<!-- Botón flotante de control -->
<div id="musicControl" style="position:fixed; bottom:20px; right:20px; z-index:999; background:rgba(240, 150, 60); border-radius:50px; padding:8px 16px; cursor:pointer; font-family:'Lato',sans-serif; font-weight:bold; box-shadow:0 4px 12px rgba(0,0,0,.2); backdrop-filter:blur(5px); display:flex; align-items:center; gap:6px;">
  <span id="musicIcon">🔇</span>
  <span id="musicText">Música</span>
</div>

<script>
(function() {
  const bgMusic = document.getElementById('bgMusic');
  // Volumen por defecto al 50%
  bgMusic.volume = 0.2;

  const musicControl = document.getElementById('musicControl');
  const musicIcon = document.getElementById('musicIcon');
  const musicText = document.getElementById('musicText');
  let musicPlaying = false;

  // Intentar reproducir automáticamente (puede ser bloqueado por el navegador)
  bgMusic.play().then(() => {
    musicPlaying = true;
    musicIcon.textContent = '🔊';
    musicText.textContent = 'Música';
  }).catch(() => {
    // Bloqueado, mostramos icono de silencio
    musicPlaying = false;
    musicIcon.textContent = '🔇';
    musicText.textContent = 'Música';
  });

  // Alternar reproducir/pausar al hacer clic
  musicControl.addEventListener('click', () => {
    if (musicPlaying) {
      bgMusic.pause();
      musicPlaying = false;
      musicIcon.textContent = '🔇';
      musicText.textContent = 'Música';
    } else {
      bgMusic.play().then(() => {
        musicPlaying = true;
        musicIcon.textContent = '🔊';
        musicText.textContent = 'Música';
      }).catch(e => {
        alert('No se pudo reproducir la música. Por favor, haz clic de nuevo.');
      });
    }
  });
})();

// ══════════════════════════════════════════════════
//  👇 ESCRIBE AQUÍ TUS RAZONES
// ══════════════════════════════════════════════════
const REASONS = [
  "Estoy contigo porque contigo soy yo, sin máscaras ni miedos.",
  "Porque tu sonrisa me calma hasta en mis peores días.",
  "Porque me haces querer ser mejor persona cada día.",
  "Porque cuando estoy contigo, todo se siente en casa.",
  "Porque confías en mí incluso cuando dudo de mí mismo.",
  "Porque tu forma de amar es sincera, sin juegos.",
  "Porque contigo aprendí lo que es amar de verdad.",
  "Porque me apoyas cuando estoy caído y celebras cuando me va bien.",
  "Porque tus abrazos arreglan lo que las palabras no pueden.",
  "Porque contigo el amor no cansa, se renueva.",
  "Porque no eres perfecta, y justo así te amo.",
  "Porque me haces reír incluso cuando no tengo ganas.",
  "Porque me eliges todos los días, y yo te elijo a ti.",
  "Porque a tu lado la vida pesa menos.",
  "Porque no te necesito para vivir soñando te quiero para vivir los sueños.",
];
// ══════════════════════════════════════════════════

const PAPER_COLORS = ['#ffb870','#ffd6e4','#fce8b0','#c8e6f9','#d4f0c0','#e8c8f8','#ffc8a0'];
const NS = 'http://www.w3.org/2000/svg';

const heartsEmoji = ['💕','💗','💖','❤️','💓','🌸','✨','💞','💝','🫶'];
let seenIndexes = [];
let currentReason = -1;
let paperCount = 0;

const MAX_PAPERS = REASONS.length;

// Jar interior bounds (SVG coords)
// x: 68–192 (width ~124), y: 62–292 (height ~230)
// Papers will stack from bottom (y≈270) upward
const JAR_LEFT   = 72;
const JAR_RIGHT  = 188;
const JAR_TOP    = 68;
const JAR_BOTTOM = 280;
const JAR_HEIGHT = JAR_BOTTOM - JAR_TOP; // 212

// Paper dimensions
const P_W = 30, P_H = 24;

// Build progress hearts
const phWrap = document.getElementById('progressHearts');
document.getElementById('totalCount').textContent = REASONS.length;
REASONS.forEach((_,i) => {
  const ph = document.createElement('span');
  ph.className = 'ph'; ph.id = `ph-${i}`;
  ph.textContent = '♥';
  phWrap.appendChild(ph);
});

// ── Add one paper into the jar SVG ──
function addPaperToJar() {
  const papersGroup = document.getElementById('jarPapers');
  const svg         = document.getElementById('jarSvg');

  const idx   = paperCount; // 0-based
  const total = MAX_PAPERS;

  // Calculate final resting position
  // Stack from bottom up, slight horizontal spread
  const rowH    = P_H + 4; // row height with gap
  const col     = idx % 3;
  const row     = Math.floor(idx / 3);
  const xBase   = JAR_LEFT + 8 + col * (P_W + 4) + (row % 2 === 0 ? 0 : 4);
  const yFinal  = JAR_BOTTOM - P_H - row * rowH;

  // Random tilt
  const rot = (Math.random() - 0.5) * 20;

  // Paper color
  const color = PAPER_COLORS[idx % PAPER_COLORS.length];

  // Create SVG group for this paper
  const g = document.createElementNS(NS, 'g');

  // Paper rect
  const rect = document.createElementNS(NS, 'rect');
  rect.setAttribute('width', P_W);
  rect.setAttribute('height', P_H);
  rect.setAttribute('rx', '2');
  rect.setAttribute('fill', color);
  rect.setAttribute('stroke', 'rgba(232,100,10,.2)');
  rect.setAttribute('stroke-width', '0.8');
  g.appendChild(rect);

  // Heart on paper
  const heart = document.createElementNS(NS, 'text');
  heart.setAttribute('x', P_W / 2);
  heart.setAttribute('y', P_H / 2 + 4);
  heart.setAttribute('text-anchor', 'middle');
  heart.setAttribute('font-size', '9');
  heart.setAttribute('fill', '#e8620a');
  heart.setAttribute('opacity', '.8');
  heart.textContent = '♥';
  g.appendChild(heart);

  // Lines on paper
  [0.35, 0.62].forEach(frac => {
    const line = document.createElementNS(NS, 'line');
    line.setAttribute('x1', 4);
    line.setAttribute('y1', P_H * frac);
    line.setAttribute('x2', P_W - 4);
    line.setAttribute('y2', P_H * frac);
    line.setAttribute('stroke', 'rgba(232,100,10,.3)');
    line.setAttribute('stroke-width', '1');
    line.setAttribute('stroke-linecap', 'round');
    g.appendChild(line);
  });

  // START position: above the jar (near the lid opening)
  const xStart  = xBase + (Math.random() - 0.5) * 6;
  const yStart  = JAR_TOP - 10;

  // Set initial transform
  g.setAttribute('transform', `translate(${xStart}, ${yStart}) rotate(${rot + 40}, ${P_W/2}, ${P_H/2})`);

  papersGroup.appendChild(g);

  // ── Animate the drop ──
  const duration   = 600 + Math.random() * 300; // ms
  const startTime  = performance.now();
  const yMid       = yStart + (yFinal - yStart) * 0.4; // bounce mid point
  const rotMid     = rot + 10;

  function animFrame(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);

    // Ease: ease-in-out with slight bounce
    const eased = easeOutBounce(t);

    const y   = yStart + (yFinal - yStart) * eased;
    const r   = (rot + 40) + (rot - (rot + 40)) * eased;
    const xOff = (Math.random() - 0.5) * 1.5; // tiny horizontal wobble

    g.setAttribute('transform',
      `translate(${xBase + xOff}, ${y}) rotate(${r}, ${P_W/2}, ${P_H/2})`
    );

    if(t < 1) {
      requestAnimationFrame(animFrame);
    } else {
      // Snap to final
      g.setAttribute('transform',
        `translate(${xBase}, ${yFinal}) rotate(${rot}, ${P_W/2}, ${P_H/2})`
      );
    }
  }
  requestAnimationFrame(animFrame);

  // Update fill rect (liquid level rises)
  const fillPct = (paperCount + 1) / MAX_PAPERS; // 0→1
  const fillH   = fillPct * JAR_HEIGHT * 0.85;
  const fillRect = document.getElementById('fillRect');
  const newY     = JAR_BOTTOM - fillH + 5;
  fillRect.setAttribute('y', newY);
  fillRect.setAttribute('height', fillH);

  paperCount++;

  // Hide hint after first click
  if(paperCount === 1) {
    document.getElementById('jarHint').textContent = '¡Toque para más! ✨';
  }
  if(paperCount >= MAX_PAPERS) {
    document.getElementById('jarHint').textContent = '¡Frasco lleno de amor! 💕';
  }
}

// Easing function: ease-out with slight bounce
function easeOutBounce(t) {
  if(t < 0.72) {
    return (t * t * 1.9) / (0.72 * 0.72);
  } else {
    const t2 = t - 0.86;
    return 1 - 0.1 * Math.cos(t2 * Math.PI * 4) * (1 - t);
  }
}

// ── Open reason ──
function openReason(e) {
  // 🔊 Reproducir sonido pop con new Audio (se crea en el momento del clic)
  const pop = new Audio('sonidos_musica/pop.mp3'); // Ruta corregida para que coincida
  pop.volume = 0.5; // Ajusta el volumen (0.0 a 1.0)
  pop.play().catch(err => {
    console.error('Error al reproducir pop:', err);
    // Puedes mostrar un mensaje silencioso si quieres
  });

  spawnClickHearts(e.clientX, e.clientY);

  // Add paper to jar
  addPaperToJar();

  // Pick unseen reason
  let unseen = REASONS.map((_,i)=>i).filter(i => !seenIndexes.includes(i));
  if(unseen.length === 0){
    seenIndexes = [];
    unseen = REASONS.map((_,i)=>i);
    // Reset papers visually if all seen
    if(paperCount >= MAX_PAPERS){
      paperCount = 0;
      document.getElementById('jarPapers').innerHTML = '';
      document.getElementById('fillRect').setAttribute('y', 297);
      document.getElementById('fillRect').setAttribute('height', 0);
      addPaperToJar(); // add back the one for this click
    }
  }
  const idx = unseen[Math.floor(Math.random() * unseen.length)];
  seenIndexes.push(idx);
  currentReason = idx;

  showModal(idx);
  updateProgress();
}

function showModal(idx) {
  const num = seenIndexes.length;
  document.getElementById('modalNum').textContent      = num;
  document.getElementById('modalNumLabel').textContent = num;
  document.getElementById('modalReason').textContent   = REASONS[idx];
  document.getElementById('modalHeart').textContent    = heartsEmoji[Math.floor(Math.random()*heartsEmoji.length)];
  spawnModalConfetti();
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if(e.target === document.getElementById('modal-overlay')) closeModal();
}

function nextReason() {
  // 🔊 También reproducir sonido al hacer clic en "Otra razón"
  const pop = new Audio('sonidos_musica/pop.mp3'); // Corregida la ruta
  pop.volume = 0.5;
  pop.play().catch(err => console.error('Error pop en nextReason:', err));

  let unseen = REASONS.map((_,i)=>i).filter(i => !seenIndexes.includes(i));
  if(unseen.length === 0){ seenIndexes=[currentReason]; unseen=REASONS.map((_,i)=>i).filter(i=>i!==currentReason); }
  const idx = unseen[Math.floor(Math.random()*unseen.length)];
  seenIndexes.push(idx); currentReason = idx;

  const card = document.getElementById('modalCard');
  card.style.animation='none'; void card.offsetWidth;
  card.style.animation='pop .35s cubic-bezier(.34,1.56,.64,1)';

  document.getElementById('modalNum').textContent      = seenIndexes.length;
  document.getElementById('modalNumLabel').textContent = seenIndexes.length;
  document.getElementById('modalReason').textContent   = REASONS[idx];
  document.getElementById('modalHeart').textContent    = heartsEmoji[Math.floor(Math.random()*heartsEmoji.length)];
  spawnModalConfetti();
  updateProgress();

  // Also add a paper for each "next reason"
  if(paperCount < MAX_PAPERS) addPaperToJar();
}

function updateProgress() {
  document.getElementById('seenCount').textContent = seenIndexes.length;
  seenIndexes.forEach(i => {
    const ph = document.getElementById(`ph-${i}`);
    if(ph) ph.classList.add('seen');
  });
}

function spawnModalConfetti() {
  const wrap = document.getElementById('modalConfetti');
  wrap.innerHTML = '';
  const colors = ['#ffb870','#e8620a','#ffe0a0','#d4a843','#fff','#ffcc80'];
  for(let i=0;i<20;i++){
    const d = document.createElement('div');
    d.className = 'm-dot';
    d.style.left   = Math.random()*100+'%';
    d.style.top    = '-5%';
    d.style.background = colors[Math.floor(Math.random()*colors.length)];
    d.style.width  = (5+Math.random()*7)+'px';
    d.style.height = (5+Math.random()*7)+'px';
    d.style.borderRadius = Math.random()>.5?'50%':'3px';
    d.style.animationDuration = (1.2+Math.random()*1.5)+'s';
    d.style.animationDelay   = (Math.random()*.5)+'s';
    wrap.appendChild(d);
    setTimeout(()=>d.remove(), 3500);
  }
}

function spawnClickHearts(x, y) {
  ['♥','💕','✨','🌸'].forEach((sym,i) => {
    const h = document.createElement('div');
    h.className = 'click-heart';
    h.textContent = sym;
    h.style.left = (x + (Math.random()-0.5)*50)+'px';
    h.style.top  = y+'px';
    h.style.fontSize = (.7+Math.random()*.8)+'rem';
    h.style.animationDelay = (i*.05)+'s';
    document.body.appendChild(h);
    setTimeout(()=>h.remove(), 1400);
  });
}

// Floating petals
const bgL = document.getElementById('bgLayer');
['🌸','✿','❀','♥','·'].forEach(sym => {
  for(let j=0;j<6;j++){
    const p=document.createElement('div');
    p.className='petal'; p.textContent=sym;
    p.style.left=Math.random()*100+'vw';
    p.style.fontSize=(.6+Math.random()*.9)+'rem';
    p.style.animationDuration=(10+Math.random()*14)+'s';
    p.style.animationDelay=(Math.random()*16)+'s';
    bgL.appendChild(p);
  }
});

document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
</script>
